<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
        }

        body {
            background: #0d0718;
            font-family: "Poppins", sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Main Box */
        .login-box {
            width: 95%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.06);
            padding: 35px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(140, 120, 255, .45);
            animation: fade 0.8s ease;
            text-align: center;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            color: #d7b7ff;
            margin-bottom: 18px;
        }

        input {
            background: #bda1ff !important;
            color: #e7d8ff;
            border: 1px solid #7a5bf8;
        }

        input:focus {
            border-color: #bda1ff !important;
            box-shadow: 0 0 10px rgba(130, 90, 255, .5);
        }

        .btn-purple {
            background: var(--pri);
            font-weight: 700;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            padding: 10px;
            transition: .25s;
            box-shadow: 0 0 18px rgba(140, 120, 255, .55);
        }

        .btn-purple:hover {
            background: var(--pri-dark);
            transform: scale(1.05);
        }

        /* Footer Link */
        .link {
            color: #d5b7ff;
            font-weight: 600;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .msg-error {
            color: #ff4978;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <form method="POST" class="login-box">

        <h2>⚙ Admin Login</h2>

        <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

        <button class="btn-purple w-100 mt-2">Login 🔐</button>

        <p class="mt-3">No account?
            <a href="/register" class="link">Register Here</a>
        </p>

        {% if msg %}
        <p class="msg-error">{{msg}}</p>
        {% endif %}
    </form>

</body>

</html>
