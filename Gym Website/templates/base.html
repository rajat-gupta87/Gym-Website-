<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fitness Portal{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
            --bg: #f7f5ff;
        }

        body {
            background: var(--bg);
            font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .navbar-main {
            background: linear-gradient(120deg, #1f1235, #3b1c78);
        }

        .brand-text {
            font-weight: 800;
            letter-spacing: .5px;
        }

        .nav-link {
            font-weight: 500;
        }

        .btn-orange {
            background: #ff9f43;
            color: #1f1f1f;
            font-weight: 600;
            border-radius: 999px;
            border: none;
        }

        .btn-orange:hover {
            background: #ffb055;
            color: #000;
        }

        .username-pill {
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.9rem;
        }

        /* Floating Back Button (हर पेज पर काम करेगा) */
        .fab-back {
            position: fixed;
            bottom: 18px;
            left: 18px;
            z-index: 999;
            border-radius: 999px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            background: var(--pri-dark);
            color: #fff;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .25);
        }

        .fab-back:hover {
            background: var(--pri);
        }

        .nav-btn-global {
            position: fixed;
            bottom: 22px;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            background: #6A5ACD;
            border: none;
            color: white;
            z-index: 9999;
            transition: .25s;
        }

        .nav-btn-global:hover {
            background: #4d3fb7;
        }

        #globalBack {
            left: 22px;
        }

        #globalHome {
            right: 22px;
        }
    </style>
</head>

<body>

    <!-- TOP NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-main navbar-dark">
        <div class="container-fluid px-3 px-md-4">

            <!-- Brand / Home -->
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span class="brand-text">🏋️‍♂️ Fitness Portal</span>
            </a>

            <!-- Mobile Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 mt-2 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/workout">Workout</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/diet">Diet</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/planner">Planner</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/tracker">Progress</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/weekly_plan">Weekly Plan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/assistant">AI Coach</a>
                    </li>
                </ul>

                <!-- Right side: Username + Logout -->
                <div class="d-flex align-items-center gap-2">

                    {% if session.get('user_name') %}
                    <span class="username-pill text-white">
                        👋 Hello, {{ session.get('user_name') }}
                    </span>
                    {% endif %}

                    <a href="/" class="btn btn-sm btn-light me-1 d-none d-md-inline">🏠 Home</a>
                    <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN PAGE CONTENT -->
    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <!-- GLOBAL BACK BUTTON (browser history back) -->
    <button class="fab-back" type="button" onclick="window.history.back()">
        ⬅ Back
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

<button onclick="history.back()" id="backBtn" class="nav-btn">⬅ Back</button>
<a href="/" id="homeBtn" class="nav-btn">Home</a>

</html>
