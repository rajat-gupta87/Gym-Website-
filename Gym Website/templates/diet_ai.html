<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diet Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0b0918;
            font-family: Poppins, sans-serif;
            color: white;
            padding-top: 50px;
            text-align: center;
        }

        h2 {
            font-weight: 800;
            color: #b479ff;
            letter-spacing: .5px;
        }

        .box {
            width: 480px;
            margin: auto;
            background: rgba(255, 255, 255, .07);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(180, 120, 255, .3);
        }

        select {
            background: #1f1b2d;
            color: #e2c6ff;
            border: 1px solid #9d6eff;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-purple {
            background: #a279ff;
            color: #fff;
            font-weight: 700;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(190, 130, 255, .5);
            transition: .3s;
        }

        .btn-purple:hover {
            transform: scale(1.06);
            background: #bb96ff;
        }

        .list-group-item {
            background: #1c172d !important;
            border-color: #9b68ff !important;
            font-weight: 600;
            color: #e0c9ff !important;
        }

        .nav-btn-global {
            position: fixed;
            bottom: 22px;
            padding: 9px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            background: #6A5ACD;
            border: none;
            color: white;
            z-index: 9999;
            transition: .25s;
        }

        .nav-btn-global:hover {
            background: #4d3fb7;
        }

        #globalBack {
            left: 22px;
        }

        #globalHome {
            right: 22px;
        }
    </style>
</head>

<body>

    <h2>🥗 AI Diet Generator</h2>

    {% if not plan %}
    <form method="POST" class="box mt-3">

        <label class="fw-bold text-light">Select Goal Type</label>
        <select name="goal" class="form-select mb-3">
            <option value="fatloss">🔥 Fat Loss</option>
            <option value="muscle">💪 Muscle Gain</option>
            <option value="strength">🏋 Strength</option>
        </select>

        <button class="btn btn-purple w-100">Generate Diet 🔥</button>

    </form>
    {% else %}
    <div class="box mt-4">
        <h4 class="fw-bold text-warning">Your Custom AI Generated Diet</h4>
        <ul class="list-group mt-3">
            {% for item in plan %}
            <li class="list-group-item">{{item}}</li>
            {% endfor %}
        </ul>
        <a href="/diet_ai" class="btn btn-purple w-100 mt-3">🔁 Generate Again</a>
    </div>
    {% endif %}

</body>

<button onclick="history.back()" id="backBtn" class="nav-btn">⬅ Back</button>
<a href="/" id="homeBtn" class="nav-btn">Home</a>

</html>
