<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Motivation Quotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
        }

        body {
            background: #0d071a;
            font-family: poppins, sans-serif;
            padding-top: 40px;
            color: white;
            text-align: center;
        }

        h2 {
            color: #b498ff;
            font-weight: 800;
            letter-spacing: .5px;
        }

        #quoteBox {
            font-size: 27px;
            font-weight: 600;
            color: #fdbf63;
            min-height: 120px;
            border-left: 6px solid #c800ff;
            background: #1a1032;
            border-radius: 12px;
            width: 75%;
            margin: auto;
            box-shadow: 0 0 18px rgba(242, 60, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            transition: .5s;
        }

        .quote-btn {
            margin-top: 25px;
            background: #8f5bff;
            border: none;
            font-size: 18px;
            font-weight: 700;
            padding: 12px 35px;
            border-radius: 50px;
            color: white;
            transition: .3s;
            box-shadow: 0 0 10px rgba(158, 107, 255, 0.5);
        }

        .quote-btn:hover {
            transform: scale(1.08);
            background: #b48fff;
        }


        /* ===================== THEMED FLOATING BUTTONS ===================== */
        .f-btn {
            position: fixed;
            bottom: 20px;
            padding: 10px 26px;
            font-weight: 700;
            border-radius: 10px;
            background: var(--pri);
            border: none;
            color: white;
            font-size: 15px;
            z-index: 99999;
            transition: .25s;
            text-decoration: none;
            box-shadow: 0 0 16px rgba(140, 120, 255, .55);
        }

        .f-btn:hover {
            background: var(--pri-dark);
            transform: scale(1.08);
        }

        #f-back {
            left: 20px;
        }

        #f-home {
            right: 20px;
            background: #9b6aff;
        }

        #f-home:hover {
            background: #b78aff;
        }
    </style>
</head>

<body>

    <h2>🔥 Daily Gym Motivation Quotes</h2>
    <p class="text-light mb-3">Consistency Creates Champions 🏆</p>

    <div id="quoteBox">Loading Quote...</div>

    <button class="quote-btn" onclick="loadQuote()">New Quote 🔥</button>

    <script>
        function loadQuote() {
            fetch("/quotes")
                .then(res => res.json())
                .then(data => {
                    let q = data[Math.floor(Math.random() * data.length)];
                    let box = document.getElementById("quoteBox");

                    box.style.opacity = 0;
                    setTimeout(() => {
                        box.innerHTML = q;
                        box.style.opacity = 1;
                    }, 300);
                });
        }
        loadQuote();
    </script>

    <!-- Final Buttons -->
    <button id="f-back" class="f-btn" onclick="history.back()">⬅ Back</button>
    <a id="f-home" class="f-btn" href="/">🏠 Home</a>

</body>

</html>
