<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --pri: #6A5ACD;
            --pri-dark: #4d3fb7;
        }

        body {
            background: #0d0718;
            font-family: "Poppins", sans-serif;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Card */
        .reg-box {
            width: 95%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.06);
            padding: 35px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(140, 120, 255, .45);
            animation: fade .8s ease;
            text-align: center;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-weight: 800;
            color: #d7b7ff;
            margin-bottom: 18px;
        }

        input {
            background: #bda1ff !important;
            border: 1px solid #7a5bf8;
            color: #e9dfff;
        }

        input:focus {
            border-color: #c6aaff !important;
            box-shadow: 0 0 12px rgba(170, 130, 255, .55);
        }

        .btn-purple {
            background: var(--pri);
            color: white;
            font-weight: 700;
            border: none;
            font-size: 16px;
            border-radius: 8px;
            padding: 10px;
            transition: .25s;
            box-shadow: 0 0 18px rgba(140, 120, 255, .55);
        }

        .btn-purple:hover {
            background: var(--pri-dark);
            transform: scale(1.05);
        }

        .login-link {
            color: #d7b7ff;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <form action="/register" method="POST" class="reg-box">

        <h2>Create Account ✨</h2>

        <input type="text" name="name" placeholder="Full Name" class="form-control mb-3" required>
        <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>
        <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

        <button class="btn-purple w-100 mt-2">Register 🚀</button>

        <p class="mt-3">
            Already have an account?
            <a href="/login" class="login-link">Login</a>
        </p>
    </form>

</body>

</html>
