<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Portal - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4efff;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --pri: #7b3cff;
            --pri-dark: #5623c9;
        }

        .hero {
            background: linear-gradient(140deg, var(--pri), #9e75ff);
            color: white;
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .18);
            margin-top: 40px;
        }

        .hero h1 {
            font-size: 40px;
            font-weight: 800;
        }

        .ai-btn {
            display: block;
            width: 90%;
            margin: 25px auto;
            background: var(--pri);
            color: #fff;
            font-size: 22px;
            padding: 18px;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 0 12px rgba(124, 85, 255, .45);
            transition: .25s;
            text-decoration: none;
        }

        .ai-btn:hover {
            background: var(--pri-dark);
            transform: scale(1.04);
        }

        .grid {
            display: grid;
            gap: 15px;
            margin: 30px auto;
            width: 92%;
        }

        @media(min-width:768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                width: 75%;
            }
        }

        .menu-btn {
            background: #fff;
            padding: 17px;
            border-radius: 12px;
            border: 2px solid var(--pri);
            color: var(--pri);
            font-weight: 700;
            text-align: center;
            transition: .25s;
            text-decoration: none;
        }

        .menu-btn:hover {
            background: var(--pri);
            color: white;
            transform: translateY(-4px);
            box-shadow: 0 0 14px rgba(124, 85, 255, .4);
        }

        /* NEW LOGOUT BUTTON */
        .logout-btn {
            background: var(--pri);
            color: white;
            padding: 10px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            transition: .25s;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: var(--pri-dark);
            box-shadow: 0 0 12px rgba(124, 85, 255, .4);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HERO TOP -->
        <div class="hero">
            <h1>Rajat's Fitness Portal</h1>
            <p>Eat Clean • Train Hard • Stay Consistent</p>
        </div>

        <!-- AI BOT -->
        <a href="/assistant" class="ai-btn">🤖 AI Smart Fitness Assistant</a>

        <!-- GRID MENU -->
        <div class="grid">
            <a href="/workout" class="menu-btn">🏋 Workout Suggestion</a>
            <a href="/weekly_plan" class="menu-btn">📆 Weekly Routine</a>
            <a href="/diet" class="menu-btn">🥗 Diet Plan Generator</a>
            <a href="/planner" class="menu-btn">📅 BMI Planner</a>
            <a href="/today_workout" class="menu-btn">Today's Workout</a>
            <a href="/calorie_calc" class="menu-btn">🔥 Calories + Protein</a>
            <a href="/strength" class="menu-btn">💥 Strength Test</a>
            <a href="/motivation" class="menu-btn">⚡ Daily Motivation</a>
            <a href="/progress" class="menu-btn text-center">🎯 Progress</a>
            <a href="/calendar" class="menu-btn text-center">📅 Calendar</a>
        </div>

        <!-- UPDATED LOGOUT BUTTON -->
        <div class="text-center mt-4 mb-5">
            <a href="/logout" class="logout-btn">🚪 Logout</a>
        </div>

    </div>

</body>

</html>
